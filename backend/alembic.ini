# alembic.ini
# Purpose: Configuration file for Alembic database migrations.

[alembic]
# Path to migration scripts folder
script_location = alembic

# Overridden dynamically at runtime in env.py from settings
sqlalchemy.url = postgresql+asyncpg://user:password@localhost:5432/cofoundr

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(name)s] %(levelname)-5s: %(message)s
datefmt = %H:%M:%S
